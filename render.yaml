services:
  - type: web
    name: indiajobportal
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: indiajobportal-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false

databases:
  - name: indiajobportal-db
    plan: free
    databaseName: indiajobportal
