{% extends 'admin/base_admin.html' %}

{% block title %}Manage Categories{% endblock %}

{% block content %}
<div class="admin-header">
    <h1>Manage Categories</h1>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="form-card">
        <h2 style="margin-bottom: 15px; font-size: 18px;">Add Category</h2>
        <form method="POST" action="{{ url_for('admin.add_category') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="name" required placeholder="e.g., PSU Jobs">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Brief description..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Add Category</button>
        </form>
    </div>

    <div class="form-card">
        <h2 style="margin-bottom: 15px; font-size: 18px;">Existing Categories</h2>
        <table class="job-table">
            <thead><tr><th>Name</th><th>Slug</th><th>Action</th></tr></thead>
            <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.name }}</td>
                <td>{{ cat.slug }}</td>
                <td>
                    <form action="{{ url_for('admin.delete_category', cat_id=cat.id) }}" method="POST" style="display: inline;" onsubmit="return confirm('Delete this category?');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
